<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }

  /* Corpo com capa de fundo */
  body {
    height: 100vh; /* ocupa toda a tela */
    background-image: url('IMG-20260315-WA0000.jpg'); /* substitua pela sua capa */
    background-size: cover; /* cobre toda a tela mantendo proporção */
    background-position: center top; /* topo sempre visível */
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
  }

  /* Se futuramente quiser adicionar conteúdo no topo ou centro */
  .hero-content {
    flex:1;
    display:flex;
    flex-direction: column;
    justify-content: flex-start; /* topo */
    align-items: center;
    padding-top: 50px; /* distância do topo */
  }

  /* Responsividade */
  @media (max-width:768px){
    body {
      background-position: center top; /* topo visível em celulares */
    }
  }
</style>
</head>
<body>
  <div class="hero-content">
    <!-- Aqui você pode adicionar futuramente título, botão, etc -->
  </div>
</body>
</html>
