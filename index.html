<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body, html {
    height: 100%;
    width: 100%;
    font-family: Arial, sans-serif;
  }

  /* Capa principal */
  .hero {
    height: 100vh; /* ocupa toda a altura da tela */
    width: 100%;
    background-image: url('IMG-20260315-WA0000.jpg'); /* sua capa */
    background-size: cover; /* cobre toda a área */
    background-position: center top; /* topo da imagem visível */
    background-repeat: no-repeat;
    position: relative;
  }

  /* Overlay opcional, se quiser escurecer a imagem */
  .overlay {
    position: absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0); /* 0 = transparente */
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="overlay"></div>
  </div>
</body>
</html>
