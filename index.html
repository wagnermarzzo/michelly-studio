<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
  body, html { height:100%; width:100%; }

  /* Cada capa */
  .hero {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background-size: cover;
    background-position: center;
  }

  .overlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(102, 0, 153, 0.5); /* Roxo translúcido */
    z-index:1;
  }

  .hero h1 {
    position: relative;
    z-index:2;
    color: #FFD700;
    font-size: 3rem;
    font-weight: 700;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    margin-bottom: 20px;
  }

  .btn-agendar {
    position: relative;
    z-index:2;
    background: #FFD700;
    color: #4B0082;
    padding: 12px 30px;
    font-size: 1.2rem;
    font-weight: 500;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
  }
  .btn-agendar:hover {
    background: #FFC700;
    transform: scale(1.05);
  }

  @media(max-width:768px){
    .hero h1 { font-size:2rem; }
    .btn-agendar { font-size:1rem; padding:10px 25px; }
  }
</style>
</head>
<body>

<!-- Capa 1 -->
<section class="hero" style="background: url('https://images.unsplash.com/photo-1590080879801-0f14e92b7e99?auto=format&fit=crop&w=1470&q=80') center/cover no-repeat;">
  <div class="overlay"></div>
  <h1>Michelly Pessoa Studio</h1>
  <a class="btn-agendar" href="#">Agendar</a>
</section>

<!-- Capa 2 -->
<section class="hero" style="background: url('https://images.unsplash.com/photo-1616616345200-4dcf234a37ee?auto=format&fit=crop&w=1470&q=80') center/cover no-repeat;">
  <div class="overlay"></div>
  <h1>Michelly Pessoa Studio</h1>
  <a class="btn-agendar" href="#">Agendar</a>
</section>

<!-- Capa 3 -->
<section class="hero" style="background: url('https://images.unsplash.com/photo-1588776814546-3fbe42fbb297?auto=format&fit=crop&w=1470&q=80') center/cover no-repeat;">
  <div class="overlay"></div>
  <h1>Michelly Pessoa Studio</h1>
  <a class="btn-agendar" href="#">Agendar</a>
</section>

</body>
  </html>
