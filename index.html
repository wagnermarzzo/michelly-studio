<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { height:100%; width:100%; }

  .hero {
    width:100%;
    overflow:hidden;
  }

  .hero img {
    width:100%;       /* ocupa toda largura */
    height:auto;      /* mantém proporção */
    display:block;    /* remove espaços em branco */
    object-fit: cover; /* mantém o zoom mínimo necessário */
  }

  /* Para telas muito estreitas */
  @media(max-width:768px){
    .hero img {
      width:100%;
      height:auto;
    }
  }
</style>
</head>
<body>
  <section class="hero">
    <img src="IMG-20260315-WA0000.jpg" alt="Capa Michelly Pessoa Studio">
  </section>
</body>
</html>
