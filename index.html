<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%;
    width:100%;
    font-family: Arial, sans-serif;
  }

  /* Capa principal */
  .hero {
    height: 100vh; /* ocupa toda a altura da tela */
    width: 100%;
    background-image: url('IMG-20260315-WA0000.jpg'); /* sua capa real */
    background-size: cover; /* preenche toda a área mantendo proporção */
    background-position: center top; /* topo visível */
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* conteúdo opcional no topo */
    align-items: center;
  }

  /* Overlay opcional, transparente */
  .overlay {
    position: absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0); /* ajuste se quiser escurecer */
  }

  /* Responsivo para celular */
  @media(max-width:768px){
    .hero {
      background-position: center top; /* mantém topo da imagem visível */
    }
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="overlay"></div>
    <!-- Aqui você pode adicionar futuramente nome do salão ou botão -->
  </div>
</body>
</html>
