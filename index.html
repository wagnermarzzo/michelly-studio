<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
  body, html { height:100%; width:100%; }

  /* Container da capa */
  .hero {
    height: 100vh;
    width: 100%;
    background: url('URL_DA_SUA_IMAGEM.jpg') center/cover no-repeat; /* Substitua pela sua capa */
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Overlay opcional para suavizar a imagem (remova se não quiser) */
  .overlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0); /* 0 = sem overlay */
    z-index:1;
  }

</style>
</head>
<body>
  <section class="hero">
    <div class="overlay"></div>
  </section>
</body>
</html>
